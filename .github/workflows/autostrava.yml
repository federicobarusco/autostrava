name: Autostrava

on:
  # schedule:
  #   - cron: "30 6-23/3 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - .github/workflows/autostrava.yml
      - autostrava/**
      - pyproject.toml
      - poetry.lock

env:
  BASE_URL: https://www.strava.com
  PYTHON_VERSION: "3.12"
  STRAVA_EMAIL: ${{ secrets.STRAVA_EMAIL }}
  STRAVA_PASSWORD: ${{ secrets.STRAVA_PASSWORD }}
jobs:
  run-kudos-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install poetry
      - run: poetry install --no-root
      - run: poetry run playwright install --with-deps firefox
      # Reuse the logged-in session's cookies across runs so we only hit
      # Strava's rate-limited login/OTP endpoints when the session actually
      # expires, instead of on every scheduled run.
      - uses: actions/cache/restore@v4
        with:
          path: storage_state.json
          key: strava-session-${{ github.run_id }}
          restore-keys: |
            strava-session-
      - run: poetry run python -m autostrava
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: storage_state.json
          key: strava-session-${{ github.run_id }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: login-debug
          path: |
            login_failed.png
            login_failed.txt
          retention-days: 5